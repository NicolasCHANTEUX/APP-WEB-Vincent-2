name: Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: NPM audit (low+)
        run: npm run security:audit

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Composer audit
        run: composer audit --no-interaction

      - name: Snyk test (if token configured)
        if: ${{ secrets.SNYK_TOKEN != '' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: npx -y snyk test --severity-threshold=low

      - name: Snyk skipped notice
        if: ${{ secrets.SNYK_TOKEN == '' }}
        run: echo "SNYK_TOKEN not configured; skipping Snyk step."
